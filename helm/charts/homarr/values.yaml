replicaCount: 1

image:
  repository: ghcr.io/homarr-labs/homarr
  tag: latest

containerPort: 7575

env:
  TZ: "Europe/London"

persistence:
  enabled: true
  existingClaim: homarr-config-nfs
  mountPath: /appdata

ingress:
  enabled: true
  host: homarr.homelab.local
  homepage:
    name: Homarr
    description: Homelab Dashboard
    icon: homarr
    group: Infrastructure

service: {}

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
