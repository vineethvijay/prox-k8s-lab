replicaCount: 1

image:
  repository: adguard/adguardhome
  tag: "v0.107.61"

containerPort: 3000

env:
  TZ: "Europe/London"

persistence:
  enabled: true
  size: 2Gi
  storageClass: nfs-hdd
  mountPath: /opt/adguardhome/work

extraVolumeMounts:
  - name: config
    mountPath: /opt/adguardhome/conf
    subPath: conf

ingress:
  enabled: true
  host: adguard.homelab.local
  tls:
    enabled: true
    secretName: adguard-tls
  homepage:
    name: AdGuard Home
    description: DNS Ad & Tracker Blocker
    icon: adguard-home
    group: Infrastructure

service:
  type: LoadBalancer
  annotations:
    metallb.io/loadBalancerIPs: "192.168.1.243"
  port: 3000
  extraPorts:
    - port: 53
      targetPort: 53
      protocol: TCP
      name: dns-tcp
    - port: 53
      targetPort: 53
      protocol: UDP
      name: dns-udp

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
