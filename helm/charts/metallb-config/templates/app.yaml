---
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: {{ .Values.pool.name }}
  namespace: {{ .Values.namespace }}
spec:
  addresses:
    {{- toYaml .Values.pool.addresses | nindent 4 }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: {{ .Values.advertisement.name }}
  namespace: {{ .Values.namespace }}
spec:
  ipAddressPools:
    - {{ .Values.pool.name }}
