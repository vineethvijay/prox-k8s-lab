replicaCount: 1

image:
  repository: ghcr.io/seerr-team/seerr
  tag: latest

containerPort: 5055

env:
  TZ: "UTC"
  LOG_LEVEL: "info"

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsUser: 1000
  runAsGroup: 1000

persistence:
  enabled: true
  existingClaim: seerr-config-nfs
  mountPath: /app/config

ingress:
  enabled: true
  host: seerr.homelab.local
  homepage:
    name: Seerr
    description: Media Requests
    icon: overseerr
    group: Media

service: {}

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /api/v1/status
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /api/v1/status
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
