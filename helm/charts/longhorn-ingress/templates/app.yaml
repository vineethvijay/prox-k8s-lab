---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: longhorn-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: {{ .Values.ingress.homepage.group | quote }}
    gethomepage.dev/name: {{ .Values.ingress.homepage.name | quote }}
    gethomepage.dev/description: {{ .Values.ingress.homepage.description | quote }}
    gethomepage.dev/icon: {{ .Values.ingress.homepage.icon | quote }}
    gethomepage.dev/pod-selector: "app=longhorn-ui"
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: longhorn-frontend
                port:
                  number: 80
