replicaCount: 1

image:
  repository: registry
  tag: "2"

ui:
  image:
    repository: joxit/docker-registry-ui
    tag: latest
  port: 80

storageClass: nfs-hdd
storageSize: 20Gi

loadBalancerIP: "192.168.1.245"
port: 5000

ingress:
  enabled: true
  host: registry.homelab.local
  homepage:
    name: Docker Registry
    description: Local Container Registry
    icon: docker
    group: Infrastructure

resources:
  registry:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
  ui:
    requests:
      memory: 32Mi
      cpu: 25m
    limits:
      memory: 128Mi
