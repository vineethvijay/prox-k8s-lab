replicaCount: 1

image:
  repository: linuxserver/sonarr
  tag: latest

containerPort: 8989

env:
  PUID: "1000"
  PGID: "1000"
  TZ: "Europe/London"

persistence:
  enabled: true
  existingClaim: sonarr-config-nfs

ingress:
  enabled: true
  host: sonarr.homelab.local
  homepage:
    name: Sonarr
    description: TV Management
    icon: sonarr
    group: Media

service: {}

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi

extraVolumeMounts:
  - name: media-int
    mountPath: /data/media/hdd-internal
  - name: nas-media
    mountPath: /data/media/NAS_MEDIA
  - name: media-filtered
    mountPath: /data/media/media-filtered/hdd-internal
  - name: downloads
    mountPath: /data/downloads
  - name: downloads
    mountPath: /downloads

extraVolumes:
  - name: media-int
    hostPath:
      path: /mnt/nfs/hdd-int/media
      type: Directory
  - name: nas-media
    hostPath:
      path: /mnt/nfs/nas-media
      type: Directory
  - name: media-filtered
    hostPath:
      path: /mnt/nfs/hdd-int/media-filtered
      type: Directory
  - name: downloads
    hostPath:
      path: /mnt/nfs/hdd-int/downloads
      type: Directory
  - name: downloads
    hostPath:
      path: /mnt/nfs/hdd-int/sabnzbd/downloads
      type: DirectoryOrCreate
