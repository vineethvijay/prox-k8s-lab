nfs-subdir-external-provisioner:
  nfs:
    server: 192.168.1.11
    path: /data/hdd-internal/k8s-data
    mountOptions:
      - nfsvers=4.2
      - hard
      - intr
      - noatime
      - async
  storageClass:
    name: nfs-hdd
    defaultClass: false
    reclaimPolicy: Retain
    onDelete: retain
    pathPattern: "${.PVC.namespace}-${.PVC.name}"
