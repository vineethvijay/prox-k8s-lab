{{- $name := .Chart.Name }}
{{- if not .Values.existingClaim }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-config
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: {{ .Values.storageClass }}
  resources:
    requests:
      storage: {{ .Values.configStorage }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config-file
data:
  .filebrowser.json: |
    {
      "port": 8080,
      "baseURL": "",
      "address": "0.0.0.0",
      "log": "stdout",
      "database": "/config/filebrowser.db",
      "root": "/srv"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: {{ $name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["--config", "/etc/filebrowser/.filebrowser.json", "--noauth"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
          volumeMounts:
            - name: config
              mountPath: /config
            - name: configfile
              mountPath: /etc/filebrowser
            - name: hdd-int
              mountPath: /srv/hdd-internal
              readOnly: true
            - name: nas-media
              mountPath: /srv/NAS_MEDIA
              readOnly: true
            - name: nas-backups
              mountPath: /srv/KOPIA_BACKUPS
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.existingClaim | default (printf "%s-config" $name) }}
        - name: configfile
          configMap:
            name: {{ $name }}-config-file
        - name: hdd-int
          hostPath:
            path: {{ .Values.nfs.hddInt }}
            type: Directory
        - name: nas-media
          hostPath:
            path: {{ .Values.nfs.nasMedia }}
            type: Directory
        - name: nas-backups
          hostPath:
            path: {{ .Values.nfs.nasBackups }}
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app: {{ $name }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - port: 8080
      targetPort: 8080
      name: http
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: {{ .Values.ingress.homepage.group | quote }}
    gethomepage.dev/name: {{ .Values.ingress.homepage.name | quote }}
    gethomepage.dev/description: {{ .Values.ingress.homepage.description | quote }}
    gethomepage.dev/icon: {{ .Values.ingress.homepage.icon | quote }}
    gethomepage.dev/pod-selector: {{ printf "app=%s" $name | quote }}
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: 8080
{{- end }}
