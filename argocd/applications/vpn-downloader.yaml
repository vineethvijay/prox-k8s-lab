---
# NOTE: Secret values (VPN creds) are injected via K8s Secret, not values-secret.yaml.
# Create the secret before syncing: see argocd/README.md
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vpn-downloader
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/youruser/proxmox-k8s.git
    targetRevision: main
    path: helm/charts/vpn-downloader
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
        - /spec/volumeMode
    - group: ""
      kind: Secret
      jsonPointers:
        - /data
        - /stringData
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
