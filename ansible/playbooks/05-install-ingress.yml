---
# 05-install-ingress.yml — Install MetalLB + NGINX Ingress Controller
#
# Usage: ansible-playbook playbooks/05-install-ingress.yml

- name: Install MetalLB and NGINX Ingress
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Set kubectl context
      ansible.builtin.command: kubectl config use-context {{ kubeconfig_context }}
      changed_when: false

    - name: Add MetalLB Helm repo
      kubernetes.core.helm_repository:
        name: metallb
        repo_url: https://metallb.github.io/metallb

    - name: Add ingress-nginx Helm repo
      kubernetes.core.helm_repository:
        name: ingress-nginx
        repo_url: https://kubernetes.github.io/ingress-nginx

    - name: Install MetalLB
      kubernetes.core.helm:
        name: metallb
        chart_ref: metallb/metallb
        release_namespace: metallb-system
        create_namespace: true
        wait: true
        timeout: 5m0s

    - name: Wait for MetalLB webhook to be ready
      ansible.builtin.pause:
        seconds: 15

    - name: Apply MetalLB IP pool config
      ansible.builtin.command: kubectl apply -f {{ metallb_config_manifest }}

    - name: Install NGINX Ingress Controller
      kubernetes.core.helm:
        name: ingress-nginx
        chart_ref: ingress-nginx/ingress-nginx
        release_namespace: ingress-nginx
        create_namespace: true
        wait: true
        timeout: 5m0s

    - name: Show Ingress Controller external IP
      ansible.builtin.command: kubectl get svc -n ingress-nginx ingress-nginx-controller
      register: ingress_svc
      changed_when: false

    - name: Display result
      ansible.builtin.debug:
        msg: "{{ ingress_svc.stdout_lines }}"
