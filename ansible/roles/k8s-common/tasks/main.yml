---
# k8s-common: Prepare a node for Kubernetes (containerd, kubeadm, kubelet, kubectl)

- name: Wait for cloud-init to finish
  ansible.builtin.command: cloud-init status --wait
  become: true
  changed_when: false
  failed_when: false

- name: Disable swap
  become: true
  block:
    - name: Turn off swap
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s.*)$'
        replace: '# \1'

- name: Load kernel modules
  become: true
  block:
    - name: Add kernel modules config
      ansible.builtin.copy:
        content: |
          overlay
          br_netfilter
        dest: /etc/modules-load.d/k8s.conf
        mode: "0644"

    - name: Load overlay module
      community.general.modprobe:
        name: overlay
        state: present

    - name: Load br_netfilter module
      community.general.modprobe:
        name: br_netfilter
        state: present

- name: Set sysctl parameters
  become: true
  block:
    - name: Write k8s sysctl config
      ansible.builtin.copy:
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1
        dest: /etc/sysctl.d/k8s.conf
        mode: "0644"
      notify: reload sysctl

- name: Install containerd
  become: true
  block:
    - name: Install containerd and dependencies
      ansible.builtin.apt:
        name:
          - containerd
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      notify: restart containerd

    - name: Configure containerd for local insecure registry
      when: local_registry is defined
      block:
        - name: Add config_path to containerd config
          ansible.builtin.lineinfile:
            path: /etc/containerd/config.toml
            insertafter: '\[plugins\."io\.containerd\.grpc\.v1\.cri"\.registry\]'
            line: '      config_path = "/etc/containerd/certs.d"'
          notify: restart containerd

        - name: Create certs.d directory for local registry
          ansible.builtin.file:
            path: "/etc/containerd/certs.d/{{ local_registry }}"
            state: directory
            mode: "0755"

        - name: Configure local registry as HTTP (insecure)
          ansible.builtin.copy:
            dest: "/etc/containerd/certs.d/{{ local_registry }}/hosts.toml"
            mode: "0644"
            content: |
              server = "http://{{ local_registry }}"

              [host."http://{{ local_registry }}"]
                capabilities = ["pull", "resolve", "push"]
                skip_verify = true
          notify: restart containerd

    - name: Enable containerd service
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started

- name: Install Kubernetes packages
  become: true
  block:
    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Kubernetes apt key
      ansible.builtin.shell: >
        curl -fsSL "https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/Release.key"
        | gpg --dearmor --yes -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        content: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ k8s_version }}/deb/ /"
        dest: /etc/apt/sources.list.d/kubernetes.list
        mode: "0644"

    - name: Install kubeadm, kubelet, kubectl
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: Hold Kubernetes packages
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl
